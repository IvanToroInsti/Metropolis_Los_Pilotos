services:
  server:
    container_name: server
    restart: always
    build: ./server
    ports:
      - "3000:3000"
    env_file:
      - path: ./server/.env
        required: true
  
  web:
    container_name: web
    build: ./web
    volumes:
      - web_data:/app/dist

  nginx:
    container_name: nginx
    image: nginx:stable-alpine3.23-perl
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - web_data:/usr/share/nginx/html/ # Volumen para servir los archivos estáticos construidos
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf # Volumen para el archivo de configuración de Nginx
      - ./cert:/cert # Certificados SSL
    depends_on:
      - server
      - web

  database:
    container_name: mariadb
    image: mariadb:latest
    restart: always

    env_file:
      - path: ./db/.env
        required: true

    extra_hosts:
      - "host.docker.internal:host-gateway"

    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "3306:3306"

volumes:
  web_data:
  db_data: