services:
  server:
    container_name: server
    restart: always
    build: ./server
    ports:
      - "3000:3000"
    env_file:
      - path: ./server/.env
        required: true
  
  web:
    container_name: web
    build: ./web
    volumes:
      - web_data:/app/dist

  nginx:
    build: ./nginx
    container_name: nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./static:/usr/share/nginx/html/ # Volumen para servir los archivos estáticos construidos
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf # Volumen para el archivo de configuración de Nginx
      - ./cert:/cert # Certificados SSL
    depends_on:
      - server
      - web

volumes:
  web_data:
