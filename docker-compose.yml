version: '3.1'
services:
  server:
    container_name: server
    restart: always
    build: ./server
  
  web:
    container_name: web
    restart: always
    build: ./web
    volumes:
      - ./static:/app/build

  database:
    container_name: mariadb
    restart: always
    build: ./db

  nginx:
    build: ./nginx
    container_name: nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./static:/usr/share/nginx/html/ # Volumen para servir los archivos estáticos construidos
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf # Volumen para el archivo de configuración de Nginx
      - ./cert:/cert # Certificados SSL
    depends_on:
      - server
      - web